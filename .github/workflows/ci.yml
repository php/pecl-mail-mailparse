name: Build and Test
on: [push, pull_request]
jobs:
  ubuntu:
    strategy:
      matrix:
          version: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    runs-on: ubuntu-latest
    steps:
      - name: Install re2c
        run: sudo apt-get install -y re2c
      - name: Checkout mailparse
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{matrix.version}}
          extensions: mbstring
          tools: phpize, php-config
      - name: phpize
        run: phpize
      - name: configure
        run: ./configure --enable-mailparse
      - name: work around missing HAVE_MBSTRING in main/php_config.h
        run: echo '#define HAVE_MBSTRING 1' >> config.h
      - name: make
        run: make
      - name: test
        run: |
          export TEST_PHP_ARGS="-n -d extension=mbstring.so -d extension=modules/mailparse.so"
          php run-tests.php -P --show-diff tests
  windows:
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        arch: [x64, x86]
        ts: [nts, ts]
    runs-on: windows-2022
    steps:
      - name: Checkout mailparse
        uses: actions/checkout@v6
      # The builder handles building, testing and artifact packaging/upload automatically
      - name: Build and test the extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          args: --enable-mailparse --enable-debug-pack
          run-tests: true
          test-runner-args: "--show-diff tests"